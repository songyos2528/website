name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: cd api && npm install

      - name: Run tests
        run: cd api && npm test
        continue-on-error: true

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "ℹ️  Railway token not configured. Skipping automated Railway deployment."
            echo ""
            echo "To enable auto-deploy to Railway:"
            echo "1. Go to https://railway.app"
            echo "2. Login and create an account (if needed)"
            echo "3. Create new project → Deploy from GitHub"
            echo "4. Select: songyos2528/website repository"
            echo "5. Configure root directory: api"
            echo "6. Add environment variables:"
            echo "   - NODE_ENV=production"
            echo "   - PORT=3000"
            echo "7. Go to https://railway.app/account/tokens"
            echo "8. Create API token"
            echo "9. Add to GitHub Secrets: RAILWAY_TOKEN"
            echo ""
            echo "Once configured, Railway will auto-deploy on every push to main branch."
          else
            echo "✅ Railway token found. Deploying..."
            npm install -g @railway/cli
            railway up
          fi
