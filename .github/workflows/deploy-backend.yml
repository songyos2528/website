name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: cd api && npm install

      - name: Run tests
        run: cd api && npm test
        continue-on-error: true

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Render
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "⚠️  Render deploy hook not configured. Cannot deploy to Render."
            echo "Setup instructions:"
            echo "1. Go to https://dashboard.render.com"
            echo "2. Select your service 'website-api'"
            echo "3. Go to Settings → Deploy Hooks"
            echo "4. Copy the webhook URL"
            echo "5. Go to GitHub Repo Settings → Secrets and variables → Actions"
            echo "6. Add secret: RENDER_DEPLOY_HOOK = (paste the webhook URL)"
          else
            echo "Triggering Render deployment..."
            curl -X POST "$RENDER_DEPLOY_HOOK"
            echo "✅ Render deployment triggered!"
          fi
